<!--
  QT-002 · Checklist 3 Lỗ Thủng Đang Rút Cạn Tiền Spa — APP DIGITAL-FIRST (CANONICAL · SSOT)
  Owner: BÌNH (P3) · Giải Pháp Đàm Hoa

  KIẾN TRÚC 1-NGUỒN-2-HÌNH-HÀI:
  - Toàn bộ nội dung nằm trong 1 object DATA (khối đánh dấu CORE-START → CORE-END bên dưới).
  - Chế độ MÀN HÌNH (#app)  = bản online tương tác (CHÍNH): tick → tính → kết quả ngay.
  - Chế độ IN (#printdoc)   = bản checklist tick tay 2 trang (PHỤ) — render từ CHÍNH DATA đó.
  - Xuất PDF: mở file bằng Chrome → Ctrl+P → A4 → Save as PDF (bật Background graphics),
    hoặc headless:  chrome --headless=new --no-pdf-header-footer --print-to-pdf=out.pdf file:///...html
  - Sửa nội dung: CHỈ sửa trong DATA. Không sửa 2 nơi.

  LỚP TÍCH HỢP (bật sau, không dựng lại app) — sửa trong CONFIG:
  - CONFIG.ctaUrl      : link điểm đến CTA (Group "Chủ Spa Bình An" / Zalo / Chẩn Đoán khi live).
  - CONFIG.webhookUrl  : endpoint nhận lead (Lark webhook do TUẤN dựng). Rỗng = form ẩn.
  - CONFIG.ga4Id       : GA4 Measurement ID. Rỗng = không đo.
-->
<style>
  :root{
    --cream:#FAF6EC; --cream2:#F2ECDC; --paper:#FFFDF7;
    --olive:#3E5541; --olive-deep:#2C3E2F; --olive-soft:#6E8168;
    --gold:#B98A3E; --clay:#B5673D; --line:#D9D0BA;
    --ink:#2B322A; --ink-soft:#5A6156;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{
    font-family:"Segoe UI","Helvetica Neue",Arial,"Noto Sans",sans-serif;
    background:var(--cream2); color:var(--ink); line-height:1.5;
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
  }

  /* ============ SCREEN APP ============ */
  #app{max-width:680px;margin:0 auto;padding:18px 14px 56px;}
  .brandbar{display:flex;justify-content:space-between;align-items:center;font-size:10px;
    letter-spacing:.12em;text-transform:uppercase;color:var(--olive-soft);margin-bottom:12px;}
  .brandbar b{color:var(--olive);}
  .card{background:var(--paper);border:1.5px solid var(--line);border-radius:16px;
    padding:20px 18px;margin-bottom:14px;box-shadow:0 3px 14px rgba(44,62,47,.07);}
  h1{font-size:clamp(22px,5.5vw,30px);line-height:1.15;color:var(--olive-deep);font-weight:800;letter-spacing:-.3px;}
  h1 .drip{color:var(--clay);}
  .subtitle{font-size:14px;color:var(--ink-soft);margin-top:7px;font-style:italic;}
  .rule{height:3px;width:60px;background:var(--gold);border-radius:3px;margin:12px 0;}
  .hookbox{background:var(--olive-deep);color:#F3EEDF;border-radius:12px;padding:14px 16px;
    font-size:14.5px;line-height:1.55;margin:10px 0 14px;}
  .hookbox b{color:#F4D48A;}
  .note{font-size:12.5px;color:var(--ink-soft);}
  .btn{display:inline-block;border:none;cursor:pointer;font-family:inherit;font-weight:800;
    border-radius:12px;transition:transform .08s ease, box-shadow .12s ease;text-decoration:none;text-align:center;}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--olive);color:#fff;font-size:16px;padding:14px 26px;width:100%;
    box-shadow:0 4px 12px rgba(62,85,65,.28);}
  .btn-primary[disabled]{background:#A9B3A6;box-shadow:none;cursor:not-allowed;}
  .btn-gold{background:var(--gold);color:#fff;font-size:15px;padding:13px 22px;width:100%;}
  .btn-ghost{background:transparent;color:var(--olive);border:1.6px solid var(--olive);
    font-size:13.5px;padding:10px 18px;width:100%;}

  /* progress */
  .progress-wrap{position:sticky;top:0;z-index:20;background:var(--cream2);padding:8px 0 6px;}
  .progress-bar{height:8px;background:var(--line);border-radius:6px;overflow:hidden;}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--olive),var(--gold));
    border-radius:6px;transition:width .25s ease;}
  .progress-label{font-size:11px;color:var(--olive-soft);margin-top:4px;text-align:right;}

  /* leak section (screen) */
  .leak-head{display:flex;gap:11px;align-items:center;margin-bottom:4px;}
  .num{flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:var(--olive);color:#fff;
    font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;}
  .leak-title{font-size:17px;font-weight:800;color:var(--olive-deep);line-height:1.2;}
  .bleed{font-size:12.8px;font-style:italic;color:var(--clay);margin:7px 0 12px;line-height:1.45;}
  .q{border-top:1px dashed var(--line);padding:11px 0 10px;}
  .q-text{font-size:14.5px;line-height:1.42;margin-bottom:9px;}
  .q-btns{display:flex;gap:9px;}
  .qb{flex:1;font-family:inherit;font-size:14px;font-weight:700;padding:10px 6px;border-radius:10px;
    border:1.8px solid var(--line);background:var(--paper);color:var(--ink-soft);cursor:pointer;
    transition:all .12s ease;}
  .qb.on-yes{background:var(--olive);border-color:var(--olive);color:#fff;}
  .qb.on-no{background:var(--clay);border-color:var(--clay);color:#fff;}
  .money-hint{font-size:12px;background:#FBF3DF;border:1px dashed var(--gold);border-radius:9px;
    padding:8px 11px;margin-top:12px;color:#6a5220;line-height:1.45;}

  /* result */
  .result-eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);
    font-weight:800;margin-bottom:8px;}
  .verdict{font-size:clamp(19px,5vw,24px);font-weight:800;color:var(--olive-deep);line-height:1.25;}
  .sev-badge{display:inline-block;font-size:12.5px;font-weight:800;border-radius:8px;padding:4px 11px;
    margin:10px 0 4px;}
  .sev-on{background:#E4EDE2;color:#33532F;}
  .sev-ro{background:#FBEED8;color:#8A5A14;}
  .sev-mau{background:#F6DFD3;color:#8F3D1C;}
  .concl{font-size:14.8px;line-height:1.6;margin-top:10px;}
  .score-row{display:flex;gap:9px;margin:16px 0 4px;}
  .score-cell{flex:1;border:1.5px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center;background:var(--cream);}
  .score-cell.worst{border-color:var(--clay);background:#FBF0E9;}
  .score-cell .ic{font-size:19px;}
  .score-cell .nm{font-size:10.5px;font-weight:800;color:var(--olive-deep);margin-top:3px;line-height:1.25;}
  .score-cell .sc{font-size:11px;color:var(--ink-soft);margin-top:3px;}
  .revealbox{background:var(--olive-deep);color:#F3EEDF;border-radius:13px;padding:16px 18px;margin-top:14px;
    font-size:14px;line-height:1.6;}
  .revealbox b{color:#F4D48A;}
  .revealbox .big{display:block;font-size:15.5px;font-weight:800;color:#fff;margin-top:9px;}
  .next-title{font-size:15.5px;font-weight:800;color:var(--olive-deep);margin-bottom:6px;}
  .next-text{font-size:13.8px;line-height:1.55;margin-bottom:13px;}
  .cta-stack{display:flex;flex-direction:column;gap:9px;}
  .signature{font-size:12.5px;color:var(--olive-soft);font-style:italic;margin-top:14px;text-align:center;line-height:1.5;}
  .footer{font-size:11px;color:var(--olive-soft);text-align:center;margin-top:18px;line-height:1.6;}

  /* lead form */
  .lead-form label{display:block;font-size:12.5px;font-weight:700;color:var(--olive-deep);margin:10px 0 4px;}
  .lead-form input{width:100%;font-family:inherit;font-size:14.5px;padding:11px 12px;border-radius:10px;
    border:1.6px solid var(--line);background:var(--paper);color:var(--ink);}
  .lead-form input:focus{outline:none;border-color:var(--olive);}
  .lead-msg{font-size:13px;margin-top:9px;}
  .hidden{display:none !important;}
  .warn-missing{border-color:var(--clay) !important; box-shadow:0 0 0 3px rgba(181,103,61,.18);}

  /* ============ PRINT DOC (bản PDF phụ — render từ cùng DATA) ============ */
  #printdoc{display:none;}
  @media print{
    body{background:#fff;}
    #app,.progress-wrap{display:none !important;}
    #printdoc{display:block;}
    .page{margin:0;box-shadow:none;width:auto;min-height:auto;padding:10mm 14mm;position:relative;background:var(--paper);}
    .page:first-child{page-break-after:always;}
  }
  /* print layout metrics (đúng bản 2 trang đã nghiệm thu) */
  #printdoc .pbrandbar{display:flex;justify-content:space-between;align-items:center;font-size:9.5px;
    letter-spacing:.14em;text-transform:uppercase;color:var(--olive-soft);margin-bottom:6px;}
  #printdoc .pbrandbar b{color:var(--olive);}
  #printdoc h1{font-size:22px;line-height:1.1;}
  #printdoc .subtitle{font-size:12px;margin-top:3px;}
  #printdoc .rule{width:58px;margin:5px 0 2px;}
  #printdoc .phook{background:var(--olive-deep);color:#F3EEDF;border-radius:10px;padding:8px 14px;margin:7px 0 5px;
    font-size:12px;line-height:1.4;}
  #printdoc .phook b{color:#F4D48A;}
  #printdoc .phowto{font-size:10.6px;color:var(--ink-soft);margin:5px 2px 7px;line-height:1.35;}
  #printdoc .ptk{display:inline-block;border:1.6px solid var(--olive);width:12px;height:12px;border-radius:3px;

  #printdoc .pleak-head{display:flex;gap:10px;align-items:center;}
  #printdoc .pnum{flex:0 0 auto;width:25px;height:25px;border-radius:50%;background:var(--olive);color:#fff;
    font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;}
  #printdoc .pleak-title{font-size:14.5px;font-weight:800;color:var(--olive-deep);line-height:1.18;}
  #printdoc .pbleed{font-size:10.8px;font-style:italic;color:var(--clay);margin:3px 0 4px;padding-left:35px;line-height:1.3;}

  #printdoc .pbox{flex:0 0 auto;display:inline-block;border:1.7px solid var(--olive);width:13px;height:13px;border-radius:3px;margin-top:1px;}
  #printdoc .pmeta{padding-left:35px;margin-top:4px;}

  #printdoc .pmoney b{color:var(--clay);}

  #printdoc .p2title{font-size:20px;font-weight:800;color:var(--olive-deep);margin:4px 0 3px;}
  #printdoc .p2sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;}
  #printdoc .pmap{display:flex;gap:11px;margin:6px 0 16px;}
  #printdoc .psys{flex:1;border:1.5px solid var(--line);border-radius:12px;padding:12px 10px;text-align:center;background:var(--cream);}
  #printdoc .psys .pdot{width:34px;height:34px;border-radius:50%;background:var(--cream2);border:2px solid var(--olive);

  #printdoc .preveal{background:var(--olive-deep);color:#F3EEDF;border-radius:14px;padding:18px 20px;margin:6px 0 16px;}

  #printdoc .preveal p{font-size:13.5px;line-height:1.62;}
  #printdoc .preveal b{color:#F4D48A;}
  #printdoc .preveal .pbig{font-size:15.5px;font-weight:800;color:#fff;display:block;margin-top:10px;}
  #printdoc .pcta{border:2px solid var(--olive);border-radius:14px;padding:16px 18px;background:var(--paper);}
  #printdoc .pcta h3{font-size:16px;color:var(--olive-deep);margin-bottom:6px;}
  #printdoc .pcta p{font-size:12.5px;color:var(--ink);margin-bottom:11px;}
  #printdoc .pcta .pval{color:var(--olive-soft);font-style:italic;}
  #printdoc .pdest{border:2px dashed var(--gold);border-radius:10px;background:#FBF3DF;padding:12px 14px;

  #printdoc .psignature{font-size:12px;color:var(--olive-soft);font-style:italic;margin-top:14px;}
  #printdoc .pfoot2{margin-top:16px;border-top:1px solid var(--line);padding-top:11px;

  #printdoc .pfoot2 b{color:var(--olive);}
  @page{size:A4;margin:0;}
</style>
</head>

/**
 * Tính kết quả từ câu trả lời.
 * @param {Object} answers - { leakId: [true/false x5] } — true = "Có" (đã có hệ thống), false = "Chưa".
 * @returns {Object} { scores, severities, biggestId, biggestScore, biggestSeverity, tiedIds, isTie, healthy, answeredCount, total }
 * Điểm rò của 1 lỗ = số câu "Chưa". Hòa điểm → ưu tiên theo DATA.tieOrder (tác động dòng tiền).
 */
function computeResult(answers) {
  const scores = {}, severities = {};
  let answeredCount = 0, total = 0;
  for (const leak of DATA.leaks) {
    const arr = (answers && answers[leak.id]) || [];
    total += leak.questions.length;
    let miss = 0;
    for (let i = 0; i < leak.questions.length; i++) {
      const v = arr[i];
      if (v === true || v === false) answeredCount++;
      if (v === false) miss++;
    }
    scores[leak.id] = miss;
    severities[leak.id] = miss <= DATA.severity.on.max ? "on" : (miss <= DATA.severity.ro.max ? "ro" : "mau");
  }
  const maxScore = Math.max(...DATA.tieOrder.map(id => scores[id]));
  const tiedIds = DATA.tieOrder.filter(id => scores[id] === maxScore);
  const biggestId = tiedIds[0]; // hòa → lỗ đứng trước trong tieOrder thắng
  const healthy = maxScore <= DATA.severity.on.max; // mọi lỗ đều "còn ổn"
  return {
    scores, severities,
    biggestId, biggestScore: maxScore, biggestSeverity: severities[biggestId],
    tiedIds, isTie: tiedIds.length > 1 && maxScore > DATA.severity.on.max,
    healthy, answeredCount, total
  };
}

    if (!ok) { $("#leadMsg").textContent = "Chị điền giúp em đủ 3 ô nha."; return; }
    const payload = {
      source: DATA.meta.code, name, phone, email,
      scores: r.scores, biggest_leak: r.biggestId, severity: r.biggestSeverity, is_tie: r.isTie,
      ts: new Date().toISOString(), page: location.href
    };
    $("#btnLead").disabled = true; $("#leadMsg").textContent = "Đang gửi…";
    fetch(CONFIG.webhookUrl, {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload)
    }).then(res => {
      if (!res.ok) throw new Error("HTTP " + res.status);
      track("qt002_lead", { biggest_leak: r.biggestId });
      $("#leadCard").innerHTML = `<p class="concl">✅ ${DATA.lead.thanks}</p>`;
    }).catch(() => {
      $("#btnLead").disabled = false; $("#leadMsg").textContent = DATA.lead.error;
    });
  }

  // ---- render: bản in (từ CÙNG DATA — không lặp nội dung) ----
  function renderPrintDoc() {
    const d = DATA;
    let p1leaks = "";
    for (const leak of d.leaks) {
      p1leaks += `<div class="pleak">
        <div class="pleak-head"><div class="pnum">${leak.num}</div><div class="pleak-title">${leak.title}</div></div>
        <p class="pbleed">${leak.bleed}</p>
        <ul class="pchecks">${leak.questions.map(q => `<li><span class="pbox"></span> ${q.t}</li>`).join("")}</ul>
        <div class="pmeta"><div class="pscale">${d.scaleText}</div>
        <div class="pmoney">${leak.money}</div>
        <span class="proot">Gốc rễ <span class="arrow">→</span> ${leak.root}</span></div></div>`;
    }
    let sysCells = d.leaks.map(l => `<div class="psys"><div class="pdot">${l.icon}</div>
      <h3>${l.shortName.replace("Hệ thống ", "Hệ thống<br>")}</h3><p>${l.tagline}</p>
      <div class="pcircle">${d.p2.circleNote}</div></div>`).join("");
    document.getElementById("printdoc").innerHTML = `
    <section class="page">
      <div class="pbrandbar"><span>🌿 ${d.meta.brand.replace("Đàm Hoa", "<b>Đàm Hoa</b>")} · ${d.meta.community}</span><span>Quà tặng miễn phí · ${d.meta.code}</span></div>
      <h1>${d.title[0]}<br><span class="drip">${d.title[1]}</span></h1>
      <div class="rule"></div><p class="subtitle">${d.subtitle}</p>
      <div class="phook">${d.hook.replace("cuối bài", "cuối trang sau")}</div>
      <p class="phowto">${d.howtoPrint.replace("đánh ✓", 'đánh <span class="ptk"></span>✓')}</p>
      ${p1leaks}
      <div class="ppagefoot"><span>🌿 ${d.meta.community} — ${d.meta.brand}</span><span>Trang 1/2 · Lật sang trang sau để thấy "1 gốc"</span></div>
    </section>
    <section class="page">
      <div class="pbrandbar"><span>🌿 ${d.meta.brand.replace("Đàm Hoa", "<b>Đàm Hoa</b>")} · ${d.meta.community}</span><span>Checklist 3 Lỗ Thủng · ${d.meta.code}</span></div>
      <h2 class="p2title">${d.p2.title}</h2><p class="p2sub">${d.p2.sub}</p>
      <div class="pmap">${sysCells}</div>
      <div class="preveal"><div class="peye">${d.reveal.eyebrow}</div>
        <p>${d.reveal.body}<span class="pbig">${d.reveal.big}</span></p></div>
      <div class="pcta"><h3>${d.cta.heading}</h3>
        <p>${d.cta.body}<br><span class="pval">${d.cta.value}</span></p>
        <div class="pdest"><div class="plbl">👉 Điểm đến</div>
          <div class="pslot">${d.cta.destLabel}</div>
          <div class="pqr">${CONFIG.ctaUrl ? CONFIG.ctaUrl : d.cta.printQrNote}</div></div></div>
      <p class="psignature">${d.signature}</p>
      <div class="pfoot2"><span><b>🌿 ${d.meta.brand}</b> · Quà tặng miễn phí cho chủ spa</span><span>${CONFIG.moreUrl ? "Nhận thêm công cụ miễn phí 👉 " + CONFIG.moreUrl : d.footer.right}</span></div>
    </section>`;
  }

  renderPrintDoc();
  renderChecklist();
})();
</script>
